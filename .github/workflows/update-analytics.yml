name: Update BigQuery Analytics

on:
  # Run weekly on Mondays at 2 AM ET (6 AM UTC during daylight saving time)
  schedule:
    - cron: '0 6 * * 1'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      days_30:
        description: 'Generate 30-day reports'
        required: false
        default: 'true'
        type: boolean
      days_90:
        description: 'Generate 90-day reports'
        required: false
        default: 'true'
        type: boolean

# Prevent concurrent runs
concurrency:
  group: analytics-update
  cancel-in-progress: false

env:
  PACKAGE: compliance-trestle
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to push changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-cloud-bigquery \
            google-auth \
            pandas \
            db-dtypes \
            tabulate \
            rich \
            plotly \
            kaleido
      
      - name: Create credentials file
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
          chmod 600 credentials.json
      
      - name: Verify credentials
        run: |
          if [ ! -f credentials.json ]; then
            echo "ERROR: credentials.json not created"
            exit 1
          fi
          if [ ! -s credentials.json ]; then
            echo "ERROR: credentials.json is empty"
            exit 1
          fi
          echo "✓ Credentials file created successfully"
      
      - name: Set up reports directory
        run: |
          mkdir -p reports
          echo "✓ Reports directory ready"
      
      - name: Generate 30-day reports
        if: github.event_name == 'schedule' || github.event.inputs.days_30 == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: |
          echo "=========================================="
          echo "Generating 30-day reports..."
          echo "=========================================="
          
          REPORT_FILE="reports/$(date +%Y.%m.%d).trestle.pypi.last-30.txt"
          
          python python/query.py all \
            --package ${{ env.PACKAGE }} \
            --days 30 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --credentials credentials.json > "$REPORT_FILE"
          
          echo "✓ 30-day report saved to: $REPORT_FILE"
      
      - name: Generate 90-day reports
        if: github.event_name == 'schedule' || github.event.inputs.days_90 == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: |
          echo "=========================================="
          echo "Generating 90-day reports..."
          echo "=========================================="
          
          REPORT_FILE="reports/$(date +%Y.%m.%d).trestle.pypi.last-90.txt"
          
          python python/query.py all \
            --package ${{ env.PACKAGE }} \
            --days 90 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --credentials credentials.json > "$REPORT_FILE"
          
          echo "✓ 90-day report saved to: $REPORT_FILE"
      
      - name: Generate world maps
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: |
          echo "=========================================="
          echo "Generating world maps..."
          echo "=========================================="
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_30 }}" == "true" ]; then
            echo "Generating 30-day map..."
            python python/map_from_reports.py --days 30
          fi
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_90 }}" == "true" ]; then
            echo "Generating 90-day map..."
            python python/map_from_reports.py --days 90
          fi
          
          echo "✓ Maps generated"
      
      - name: Generate MCP analysis
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: |
          echo "=========================================="
          echo "Generating MCP inference analysis..."
          echo "=========================================="
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_30 }}" == "true" ]; then
            echo "Generating 30-day MCP analysis..."
            python python/mcp_inference_analysis.py \
              --package ${{ env.PACKAGE }} \
              --days 30 \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --credentials credentials.json \
              --output-dir reports
          fi
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_90 }}" == "true" ]; then
            echo "Generating 90-day MCP analysis..."
            python python/mcp_inference_analysis.py \
              --package ${{ env.PACKAGE }} \
              --days 90 \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --credentials credentials.json \
              --output-dir reports
          fi
          
          echo "✓ MCP analysis complete"
      
      - name: Generate deployment visualizations
        env:
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: |
          echo "=========================================="
          echo "Generating deployment visualizations..."
          echo "=========================================="
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_30 }}" == "true" ]; then
            echo "Generating 30-day deployment charts..."
            python python/visualize_deployment.py \
              --package ${{ env.PACKAGE }} \
              --days 30 \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --credentials credentials.json \
              --output-dir reports
          fi
          
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.days_90 }}" == "true" ]; then
            echo "Generating 90-day deployment charts..."
            python python/visualize_deployment.py \
              --package ${{ env.PACKAGE }} \
              --days 90 \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --credentials credentials.json \
              --output-dir reports
          fi
          
          echo "✓ Deployment visualizations complete"
      
      - name: Update README with latest metrics
        run: |
          echo "=========================================="
          echo "Updating README.md with latest metrics..."
          echo "=========================================="
          
          # Find the most recent report files
          REPORT_30=$(ls -t reports/*.last-30.txt 2>/dev/null | head -1)
          REPORT_90=$(ls -t reports/*.last-90.txt 2>/dev/null | head -1)
          
          if [ -n "$REPORT_30" ] && [ -n "$REPORT_90" ]; then
            python python/update_readme.py \
              --report-30 "$REPORT_30" \
              --report-90 "$REPORT_90" \
              --readme README.md
            echo "✓ README.md updated"
          else
            echo "⚠ Report files not found, skipping README update"
          fi
      
      - name: Clean up credentials
        if: always()
        run: |
          rm -f credentials.json
          echo "✓ Credentials cleaned up"
      
      - name: Check for changes
        id: check_changes
        run: |
          git add reports/ README.md
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in reports/ and/or README.md"
          fi
      
      - name: Commit and push changes to main
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: update analytics reports - $TIMESTAMP" \
                     -m "Automated update of BigQuery analytics data" \
                     -m "- Updated reports and visualizations" \
                     -m "- Updated README.md with latest metrics" \
                     -m "- Generated by GitHub Actions workflow"
          
          git push
          
          echo "✓ Changes committed and pushed to main"
      
      - name: Create/update monthly backup branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Get current month (01-12)
          MONTH=$(date +%m)
          MONTH_BRANCH="reports/$MONTH"
          MONTH_NAME=$(date +%B)
          
          echo "=========================================="
          echo "Creating/updating monthly backup: $MONTH_BRANCH ($MONTH_NAME)"
          echo "=========================================="
          
          # Fetch all branches
          git fetch origin
          
          # Check if branch exists remotely
          if git ls-remote --heads origin "$MONTH_BRANCH" | grep -q "$MONTH_BRANCH"; then
            echo "Branch $MONTH_BRANCH exists, checking it out..."
            git checkout "$MONTH_BRANCH"
            git pull origin "$MONTH_BRANCH" || true
          else
            echo "Branch $MONTH_BRANCH does not exist, creating it..."
            git checkout -b "$MONTH_BRANCH"
          fi
          
          # Copy reports from main
          git checkout main -- reports/
          git checkout main -- README.md
          
          # Commit (force overwrite for the month)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git add reports/ README.md
          git commit -m "chore: $MONTH_NAME backup - $TIMESTAMP" \
                     -m "Monthly snapshot of analytics reports for $MONTH_NAME" \
                     -m "- This branch is overwritten each year" \
                     -m "- Generated by GitHub Actions workflow" || true
          
          # Force push to overwrite previous year's data
          git push -f origin "$MONTH_BRANCH"
          echo "✓ Monthly backup branch $MONTH_BRANCH updated"
          
          # Return to main branch
          git checkout main
          
          echo "=========================================="
          echo "✓ Monthly backup complete: $MONTH_BRANCH"
          echo "=========================================="
      
      - name: Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Analytics Update Summary"
          echo "=========================================="
          echo "Package: ${{ env.PACKAGE }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M UTC")"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "=========================================="
          
          if [ -d reports ]; then
            echo "Generated files:"
            ls -lh reports/ | tail -n +2 | awk '{print "  " $9 " (" $5 ")"}'
          fi
          
          echo "=========================================="
          echo "✓ Analytics update complete"
          echo "=========================================="

# Made with Bob
