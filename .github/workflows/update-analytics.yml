name: Update PyPI Analytics

on:
  schedule:
    # Runs weekly on Mondays at 8:00 AM UTC (4:00 AM ET)
    # Note: GitHub may delay scheduled runs by up to 1 hour
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      package:
        description: 'PyPI package name (optional, overrides config)'
        required: false
        type: string
      days:
        description: 'Days to analyze (optional, overrides config)'
        required: false
        type: number
        default: 30

env:
  # Default configuration - can be overridden by workflow_dispatch inputs
  DEFAULT_PACKAGE: 'compliance-trestle'
  DEFAULT_DAYS_30: 30
  DEFAULT_DAYS_90: 90

jobs:
  generate-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "❌ ERROR: GCP_SERVICE_ACCOUNT_KEY secret is not set"
            echo "Please configure GitHub secrets as described in SETUP.md"
            exit 1
          fi
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ ERROR: GCP_PROJECT_ID secret is not set"
            echo "Please configure GitHub secrets as described in SETUP.md"
            exit 1
          fi
          echo "✅ All required secrets are configured"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Restore BigQuery cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: bigquery-cache-${{ github.event.inputs.package || env.DEFAULT_PACKAGE }}-${{ github.event.inputs.days || env.DEFAULT_DAYS_30 }}-${{ github.run_id }}
          restore-keys: |
            bigquery-cache-${{ github.event.inputs.package || env.DEFAULT_PACKAGE }}-${{ github.event.inputs.days || env.DEFAULT_DAYS_30 }}-
            bigquery-cache-${{ github.event.inputs.package || env.DEFAULT_PACKAGE }}-
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Determine package and days
        id: config
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            echo "package=${{ github.event.inputs.package }}" >> $GITHUB_OUTPUT
          else
            echo "package=${{ env.DEFAULT_PACKAGE }}" >> $GITHUB_OUTPUT
          fi
          
          # Always generate both 30-day and 90-day reports
          echo "days_30=${{ env.DEFAULT_DAYS_30 }}" >> $GITHUB_OUTPUT
          echo "days_90=${{ env.DEFAULT_DAYS_90 }}" >> $GITHUB_OUTPUT
      
      - name: Generate 30-day analytics
        run: |
          python generate_analytics.py \
            --package "${{ steps.config.outputs.package }}" \
            --days ${{ steps.config.outputs.days_30 }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --output-dir reports.wip
      
      - name: Generate 90-day analytics
        run: |
          python generate_analytics.py \
            --package "${{ steps.config.outputs.package }}" \
            --days ${{ steps.config.outputs.days_90 }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --output-dir reports.wip
      
      - name: Atomically replace reports and README
        run: |
          echo "========================================================================"
          echo "Atomically replacing reports/ and README.md with new content..."
          echo "========================================================================"
          
          # Backup old files
          if [ -d reports ]; then
            rm -rf reports.backup
            mv reports reports.backup
            echo "✓ Backed up old reports/ to reports.backup/"
          fi
          
          if [ -f README.md ]; then
            cp README.md README.backup
            echo "✓ Backed up old README.md to README.backup"
          fi
          
          # Move new files into place atomically
          if [ -d reports.wip ]; then
            mv reports.wip reports
            echo "✓ Moved reports.wip/ to reports/"
          else
            echo "❌ ERROR: reports.wip/ not found!"
            exit 1
          fi
          
          if [ -f README.wip ]; then
            mv README.wip README.md
            echo "✓ Moved README.wip to README.md"
          else
            echo "⚠ WARNING: README.wip not found, keeping existing README.md"
          fi
          
          # Clean up backups after successful swap
          if [ -d reports.backup ]; then
            rm -rf reports.backup
            echo "✓ Removed reports.backup/"
          fi
          
          if [ -f README.backup ]; then
            rm -f README.backup
            echo "✓ Removed README.backup"
          fi
          
          echo "========================================================================"
          echo "✓ Atomic replacement complete!"
          echo "========================================================================"
      
      - name: Commit and push reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pull latest changes first to avoid conflicts
          git pull origin main
          
          # Add all generated reports and README
          git add reports/ README.md
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PyPI analytics for ${{ steps.config.outputs.package }} - $(date -u +%Y-%m-%d)"
            
            # Push with retry logic
            max_retries=3
            retry_count=0
            until git push origin main || [ $retry_count -eq $max_retries ]; do
              retry_count=$((retry_count + 1))
              echo "Push failed, retrying ($retry_count/$max_retries)..."
              git pull --rebase origin main
              sleep 2
            done
            
            if [ $retry_count -eq $max_retries ]; then
              echo "Failed to push after $max_retries attempts"
              exit 1
            fi
          fi
      
      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-analytics-reports
          path: reports/
          retention-days: 30

